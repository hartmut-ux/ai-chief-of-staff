name: Daily Chief-of-Staff Briefing

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_BRIEFING_PAGE_ID: ${{ secrets.NOTION_BRIEFING_PAGE_ID }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          CUSTOM_API_URL: ${{ secrets.CUSTOM_API_URL }}
          CUSTOM_API_KEY: ${{ secrets.CUSTOM_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python .kimi/skills/chief-of-staff/scripts/run_briefing.py --preview

      - name: Upload briefing artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-briefing
          path: memory/output/daily-briefing.md
          if-no-files-found: warn
